name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Prepare offline fallback bundle (dist/)
        run: |
          mkdir -p dist
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
              <title>Daily Planner</title>
              <meta http-equiv="refresh" content="0; url=https://sanjuplanner.lovable.app/" />
              <style>
                html,body{margin:0;height:100%;background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif}
                .wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
                a{color:#d97757;text-decoration:none;font-weight:600}
              </style>
            </head>
            <body>
              <div class="wrap">
                <div>
                  <h1 style="font-size:20px;margin:0 0 8px">Daily Planner</h1>
                  <p style="margin:0 0 16px;color:#94a3b8">Reconnecting…</p>
                  <a href="https://sanjuplanner.lovable.app/">Open app</a>
                </div>
              </div>
            </body>
          </html>
          HTML
          cp public/icon-512.png dist/icon-512.png 2>/dev/null || true
          cp public/manifest.webmanifest dist/manifest.webmanifest 2>/dev/null || true
          cp public/favicon.ico dist/favicon.ico 2>/dev/null || true

      - name: Ensure Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx --yes cap add android
          fi

      - name: Generate Android icons & splash (optional)
        run: |
          if [ -f "public/icon-512.png" ]; then
            mkdir -p assets
            cp public/icon-512.png assets/icon-only.png || true
            cp public/icon-512.png assets/icon-foreground.png || true
            npx --yes @capacitor/assets@latest generate --android \
              --iconBackgroundColor "#0f172a" \
              --iconBackgroundColorDark "#0f172a" \
              --splashBackgroundColor "#0f172a" \
              --splashBackgroundColorDark "#0f172a" || true
          fi

      - name: Sync Capacitor
        run: npx --yes cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare phone-friendly APK file
        run: |
          mkdir -p apk
          cp android/app/build/outputs/apk/debug/app-debug.apk apk/Daily-Planner-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Planner-debug-apk
          path: apk/Daily-Planner-debug.apk
          if-no-files-found: error
          retention-days: 30
