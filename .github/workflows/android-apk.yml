name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web bundle
        run: bun run build

      - name: Ensure Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Generate Android icons & splash
        run: |
          bun add -D @capacitor/assets || true
          if [ -f "public/icon-512.png" ]; then
            mkdir -p assets
            cp public/icon-512.png assets/icon-only.png || true
            cp public/icon-512.png assets/icon-foreground.png || true
            bunx @capacitor/assets generate --android --iconBackgroundColor "#0f172a" --iconBackgroundColorDark "#0f172a" --splashBackgroundColor "#0f172a" --splashBackgroundColorDark "#0f172a" || true
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
