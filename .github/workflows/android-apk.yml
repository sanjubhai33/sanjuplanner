name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=2 -Dfile.encoding=UTF-8
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Check build tools
        run: |
          node -v
          npm -v
          java -version
          ./node_modules/.bin/cap --version

      - name: Build web app
        run: npm run build

      - name: Prerender offline index.html
        env:
          CI: "true"
        run: |
          set -e
          # Locate build output (nitro may emit to dist/ or .output/)
          CLIENT_DIR=""
          for d in dist/client .output/public; do
            if [ -d "$d" ]; then CLIENT_DIR="$d"; break; fi
          done
          if [ -z "$CLIENT_DIR" ]; then
            echo "No client build directory found." >&2
            find . -maxdepth 3 -type d \( -name client -o -name public \) 2>/dev/null | sed -n '1,40p' >&2
            exit 1
          fi
          echo "Using client dir: $CLIENT_DIR"

          # Run vite preview which serves the built SSR app
          nohup npx --yes vite preview --port 8799 --host 127.0.0.1 >/tmp/preview.log 2>&1 &
          PPID_=$!
          echo "Waiting for preview server (pid=$PPID_)..."
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8799/ -o /tmp/idx.html; then ok=1; break; fi
            if ! kill -0 $PPID_ 2>/dev/null; then
              echo "vite preview exited early." >&2
              break
            fi
            sleep 2
          done
          echo "=== preview.log (tail) ==="
          tail -120 /tmp/preview.log || true
          kill $PPID_ 2>/dev/null || true
          pkill -f "vite preview" 2>/dev/null || true

          if [ "$ok" != "1" ] || [ ! -s /tmp/idx.html ]; then
            echo "Failed to prerender index; writing minimal fallback." >&2
            # Fallback: use the built index if present, else a minimal shell
            if [ -f "$CLIENT_DIR/index.html" ]; then
              echo "Using existing $CLIENT_DIR/index.html"
            else
              cat > /tmp/idx.html <<'HTML'
          <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Planner</title></head><body><div id="root">Loading...</div><script>location.reload()</script></body></html>
          HTML
              cp /tmp/idx.html "$CLIENT_DIR/index.html"
            fi
          else
            cp /tmp/idx.html "$CLIENT_DIR/index.html"
          fi

          # Ensure PWA assets exist in client dir
          test -f "$CLIENT_DIR/icon-512.png" || cp public/icon-512.png "$CLIENT_DIR/icon-512.png" 2>/dev/null || true
          test -f "$CLIENT_DIR/manifest.webmanifest" || cp public/manifest.webmanifest "$CLIENT_DIR/manifest.webmanifest" 2>/dev/null || true
          test -f "$CLIENT_DIR/favicon.ico" || cp public/favicon.ico "$CLIENT_DIR/favicon.ico" 2>/dev/null || true

          # If output was .output/public, mirror to dist/client for Capacitor
          if [ "$CLIENT_DIR" != "dist/client" ]; then
            mkdir -p dist/client
            cp -r "$CLIENT_DIR"/. dist/client/
          fi

          echo "Prerendered index.html (first 400 bytes):"
          head -c 400 dist/client/index.html
          echo




      - name: Ensure Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            ./node_modules/.bin/cap add android
          fi

      - name: Cache Gradle after Android project exists
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/gradle.properties', 'android/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Harden generated Android project
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_HOME/ANDROID_SDK_ROOT is missing" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$SDK_DIR" > android/local.properties

          python3 - <<'PY'
          from pathlib import Path

          props = Path('android/gradle.properties')
          text = props.read_text() if props.exists() else ''
          settings = {
              'org.gradle.jvmargs': '-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC',
              'org.gradle.daemon': 'false',
              'org.gradle.parallel': 'false',
              'org.gradle.workers.max': '2',
              'android.useAndroidX': 'true',
              'android.enableJetifier': 'true',
          }
          lines = [line for line in text.splitlines() if not any(line.startswith(f'{key}=') for key in settings)]
          lines.extend(f'{key}={value}' for key, value in settings.items())
          props.write_text('\n'.join(lines).strip() + '\n')

          variables = Path('android/variables.gradle')
          vtext = variables.read_text()
          if "buildToolsVersion" not in vtext:
              vtext = vtext.replace("targetSdkVersion = 36", "targetSdkVersion = 36\n    buildToolsVersion = '36.0.0'")
          variables.write_text(vtext)

          patched = []
          for gradle_file in Path('android').rglob('*.gradle'):
              gtext = gradle_file.read_text()
              updated = gtext.replace("getDefaultProguardFile('proguard-android.txt')", "getDefaultProguardFile('proguard-android-optimize.txt')")
              if updated != gtext:
                  gradle_file.write_text(updated)
                  patched.append(str(gradle_file))
          print('Patched ProGuard files:', patched)
          PY

          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          echo "ANDROID_HOME=$SDK_DIR"
          ls "$SDK_DIR/platforms" | tail -10
          ls "$SDK_DIR/build-tools" | tail -10

      - name: Sync Capacitor
        run: ./node_modules/.bin/cap sync android

      - name: Patch Gradle compatibility after sync
        run: |
          python3 - <<'PY'
          from pathlib import Path

          patched = []
          for gradle_file in Path('android').rglob('*.gradle'):
              gtext = gradle_file.read_text()
              updated = gtext.replace("getDefaultProguardFile('proguard-android.txt')", "getDefaultProguardFile('proguard-android-optimize.txt')")
              if updated != gtext:
                  gradle_file.write_text(updated)
                  patched.append(str(gradle_file))
          print('Patched ProGuard files after sync:', patched)
          PY

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee ../gradle-build.log

      - name: Show Android build outputs
        if: always()
        run: |
          echo "=== Real Gradle errors, if any ==="
          grep -nE "FAILURE:|What went wrong:|Execution failed|Could not|error:|Exception|BUILD FAILED" gradle-build.log | head -80 || true
          echo "=== APK outputs ==="
          ls -R android/app/build/outputs/apk || true
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" | tail -20 || true

      - name: Upload Gradle build log if failed
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-gradle-build-log
          path: gradle-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare phone-friendly APK file
        run: |
          mkdir -p apk
          cp android/app/build/outputs/apk/debug/app-debug.apk apk/Daily-Planner-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: Daily-Planner-debug-apk
          path: apk/Daily-Planner-debug.apk
          if-no-files-found: error
          retention-days: 30
